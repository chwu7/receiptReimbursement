spring:
  application:
    name: receipt-reimbursement

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:reimbursement}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

r2:
  bucket-name: ${R2_BUCKET}
  endpoint: ${R2_ENDPOINT}
  credentials:
    access-key: ${R2_ACCESS_KEY_ID}
    secret-key: ${R2_SECRET_ACCESS_KEY}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours default

  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL}

  anthropic:
    api-key: ${ANTHROPIC_API_KEY}

  tabscanner:
    api-key: ${TABSCANNER_API_KEY}
    base-url: https://api.tabscanner.com/api/2
    poll-interval-ms: 2000
    max-poll-attempts: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
