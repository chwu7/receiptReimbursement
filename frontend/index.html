<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Reimbursement</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { margin-bottom: 24px; }
        h2 { margin: 32px 0 16px; border-bottom: 2px solid #ddd; padding-bottom: 8px; }

        .form-section { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .file-input { padding: 8px 0; }

        button[type="submit"] {
            background: #2563eb; color: #fff; border: none; padding: 12px 28px;
            border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px;
        }
        button[type="submit"]:hover { background: #1d4ed8; }
        button[type="submit"]:disabled { background: #93c5fd; cursor: not-allowed; }

        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
            border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite;
            vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-card { background: #fff; border-radius: 8px; padding: 20px; margin-top: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .result-card.error { border-left: 4px solid #ef4444; }
        .result-card.success { border-left: 4px solid #22c55e; }

        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin: 12px 0; }
        .result-grid dt { font-weight: 600; color: #555; }
        .result-grid dd { margin: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #eee; }
        th { background: #f9fafb; font-weight: 600; }

        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-verified { background: #dbeafe; color: #1e40af; }
        .badge-approved { background: #d1fae5; color: #065f46; }
        .badge-denied { background: #fee2e2; color: #991b1b; }

        .submissions-list { margin-top: 16px; }
        .submission-item { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.1); cursor: pointer; transition: box-shadow .15s; }
        .submission-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        .submission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .meta-row { font-size: 13px; color: #666; margin-top: 4px; }
        .status-controls { margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; display: none; }
        .submission-item.expanded .status-controls { display: block; }
        .status-btn { border: none; padding: 6px 16px; border-radius: 6px; font-size: 13px;
            font-weight: 600; cursor: pointer; margin-right: 8px; }
        .status-btn:disabled { opacity: .5; cursor: not-allowed; }
        .status-btn-pending { background: #fef3c7; color: #92400e; }
        .status-btn-verified { background: #dbeafe; color: #1e40af; }
        .status-btn-approved { background: #d1fae5; color: #065f46; }
        .status-btn-denied { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="container">
    <h1>Receipt Reimbursement</h1>

    <div class="form-section">
        <form id="reimbursementForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="message">Description</label>
                <textarea id="message" placeholder="What was this expense for?" required></textarea>
            </div>
            <div class="form-group">
                <label for="paymentMethod">Preferred Payment Method</label>
                <input type="text" id="paymentMethod" placeholder="e.g. Zelle, (123) 456-7890" required>
            </div>
            <div class="form-group">
                <label for="receipt">Receipt Image (JPG/PNG)</label>
                <input type="file" id="receipt" accept="image/jpeg,image/png" class="file-input" required>
            </div>
            <button type="submit" id="submitBtn">Submit Reimbursement</button>
        </form>
    </div>

    <div id="resultArea"></div>

    <h2>Past Submissions</h2>
    <div id="submissionsList" class="submissions-list">
        <p style="color:#888;">Loading...</p>
    </div>
</div>

<script>
    const API = '/api/reimbursements';

    async function loadCategories() {
        try {
            const res = await fetch(API + '/form');
            const data = await res.json();
            const sel = document.getElementById('category');
            sel.innerHTML = '<option value="">Select a category</option>' +
                data.categories.map(c => `<option value="${c}">${c.replace(/_/g, ' ')}</option>`).join('');
        } catch (e) {
            console.error('Failed to load categories', e);
        }
    }

    async function loadSubmissions() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const container = document.getElementById('submissionsList');
            if (!data.length) {
                container.innerHTML = '<p style="color:#888;">No submissions yet.</p>';
                return;
            }
            container.innerHTML = data.map(s => `
                <div class="submission-item" onclick="toggleExpand(this)">
                    <div class="submission-header">
                        <strong>${esc(s.fullName)}</strong>
                        <span class="badge badge-${s.status.toLowerCase()}">${s.status}</span>
                    </div>
                    <div>${esc(s.message)}</div>
                    <div class="meta-row">
                        ${s.category.replace(/_/g, ' ')} &middot;
                        $${s.amount.toFixed(2)} &middot;
                        ${esc(s.paymentMethod)} &middot;
                        ${new Date(s.createdAt).toLocaleDateString()}
                    </div>
                    <div class="status-controls">
                        <span style="font-weight:600;font-size:13px;margin-right:12px;">Change status:</span>
                        ${['PENDING','VERIFIED','APPROVED','DENIED'].map(st =>
                            `<button class="status-btn status-btn-${st.toLowerCase()}" ${s.status === st ? 'disabled' : ''}
                                onclick="event.stopPropagation(); updateStatus(${s.id}, '${st}')">${st}</button>`
                        ).join('')}
                    </div>
                </div>
            `).join('');
        } catch (e) {
            console.error('Failed to load submissions', e);
        }
    }

    document.getElementById('reimbursementForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const resultArea = document.getElementById('resultArea');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Submitting & scanning receipt...';
        resultArea.innerHTML = '';

        const formData = new FormData();
        formData.append('receipt', document.getElementById('receipt').files[0]);

        const requestData = {
            fullName: document.getElementById('fullName').value,
            amount: parseFloat(document.getElementById('amount').value),
            message: document.getElementById('message').value,
            category: document.getElementById('category').value,
            paymentMethod: document.getElementById('paymentMethod').value
        };
        formData.append('request', new Blob([JSON.stringify(requestData)], { type: 'application/json' }));

        try {
            const res = await fetch(API, { method: 'POST', body: formData });
            const data = await res.json();

            if (!res.ok) {
                resultArea.innerHTML = `<div class="result-card error"><strong>Error:</strong> ${esc(data.error || JSON.stringify(data))}</div>`;
                return;
            }

            resultArea.innerHTML = `
                <div class="result-card success">
                    <h3>Submission Saved</h3>
                    <dl class="result-grid">
                        <dt>ID</dt><dd>${esc(data.id)}</dd>
                        <dt>Form ID</dt><dd>${esc(data.formId)}</dd>
                        <dt>Amount</dt><dd>$${data.amount.toFixed(2)}</dd>
                        <dt>Payment</dt><dd>${esc(data.paymentMethod)}</dd>
                        <dt>Status</dt><dd><span class="badge badge-${data.status.toLowerCase()}">${data.status}</span></dd>
                        <dt>Receipt URL</dt><dd><a href="${esc(data.receiptUrl)}" target="_blank">View in R2</a></dd>
                        <dt>Establishment</dt><dd>${esc(data.receiptEstablishment || 'N/A')}</dd>
                        <dt>Date</dt><dd>${esc(data.receiptDate || 'N/A')}</dd>
                        <dt>Total</dt><dd>${data.receiptTotal != null ? '$' + data.receiptTotal.toFixed(2) : 'N/A'}</dd>
                        <dt>Subtotal</dt><dd>${data.receiptSubTotal != null ? '$' + data.receiptSubTotal.toFixed(2) : 'N/A'}</dd>
                        <dt>Tax</dt><dd>${data.receiptTax != null ? '$' + data.receiptTax.toFixed(2) : 'N/A'}</dd>
                        <dt>Confidence</dt><dd>${data.receiptTotalConfidence != null ? (data.receiptTotalConfidence * 100).toFixed(1) + '%' : 'N/A'}</dd>
                    </dl>
                    ${renderLineItems(data.receiptLineItems)}
                </div>
            `;
            document.getElementById('reimbursementForm').reset();
            loadSubmissions();
        } catch (err) {
            resultArea.innerHTML = `<div class="result-card error"><strong>Network error:</strong> ${esc(err.message)}</div>`;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Submit Reimbursement';
        }
    });

    function renderLineItems(items) {
        if (!items || !items.length) return '<p style="color:#888;margin-top:12px;">No line items detected.</p>';
        return `
            <h4 style="margin-top:16px;">Line Items</h4>
            <table>
                <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
                <tbody>
                    ${items.map(i => `<tr>
                        <td>${esc(i.descClean || i.desc || '')}</td>
                        <td>${i.qty != null ? i.qty : ''}</td>
                        <td>${i.price != null ? '$' + i.price.toFixed(2) : ''}</td>
                        <td>${i.lineTotal != null ? '$' + i.lineTotal.toFixed(2) : ''}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        `;
    }

    function toggleExpand(el) {
        el.classList.toggle('expanded');
    }

    async function updateStatus(id, status) {
        try {
            const res = await fetch(`${API}/${id}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (!res.ok) {
                const err = await res.json();
                alert('Failed to update status: ' + (err.error || res.statusText));
                return;
            }
            loadSubmissions();
        } catch (e) {
            alert('Network error: ' + e.message);
        }
    }

    function esc(s) {
        if (s == null) return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    loadCategories();
    loadSubmissions();
</script>
</body>
</html>
